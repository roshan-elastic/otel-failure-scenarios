# Chaos Mesh experiment: inject IO errors on the frontend pod every 2 minutes.
# Causes 99% of IO operations under /home to fail with errno 5 (EIO).
# Duration: 90 seconds per injection.
#
# Apply:
#   kubectl apply -f chaos-mesh/io-error-frontend.yaml
#
# Remove:
#   kubectl delete -f chaos-mesh/io-error-frontend.yaml
#
# Get your current namespace:
#   kubectl config view --minify -o jsonpath='{..namespace}'
#
# Replace MY_NAMESPACE below with your actual cluster namespace before applying.
---
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: schedule-io-frontend
  namespace: MY_NAMESPACE
spec:
  schedule: '*/2 * * * *'
  historyLimit: 2
  concurrencyPolicy: 'Forbid'
  type: 'IOChaos'
  ioChaos:
    selector:
      namespaces:
        - MY_NAMESPACE
      labelSelectors:
        'app.kubernetes.io/component': 'frontend'
    action: fault
    mode: one
    volumePath: /home
    path: /home/**/*
    errno: 5
    percent: 99
    duration: '90s'
